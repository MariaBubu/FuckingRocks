<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edu-page</title>
    <link rel="stylesheet" href="$stylesheet_url">

    <!-- Import Map for React & Three.js -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.160.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber"
      }
    }
    </script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div class="decor-blob decor-blob-1" aria-hidden="true"></div>
    <div class="decor-blob decor-blob-2" aria-hidden="true"></div>
    <main class="shell">
      <header class="app-header">
        <div class="logo-wrap">
          <span class="header-tagline standalone-title">Educational Hub</span>
        </div>
        <div class="header-actions">
          <div class="model-info-dropdown-container">
            <button id="model-status-btn" class="header-icon-btn" aria-label="Show Model Status" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
              </svg>
            </button>
            <div id="model-status-popover" class="model-info-popover">
              <div class="popover-header">
                <h3>System Status</h3>
              </div>
              <div class="popover-body">
                <div class="info-row">
                  <span class="info-label">Model status:</span>
                  <span id="model-status-popover-text" class="status-indicator-value">Checking...</span>
                </div>
              </div>
            </div>
          </div>
          <a class="header-link-button" href="/">Home</a>
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light/dark theme" type="button">◐</button>
        </div>
      </header>
      <section class="panel home-panel" aria-label="Educational Resources" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 50vh;">
        <a href="/diagenesis" style="display: flex; flex-direction: column; align-items: center; text-decoration: none; gap: 16px; transition: transform 0.2s;" onmouseover="this.style.transform='translateY(-4px)'" onmouseout="this.style.transform='translateY(0)'">
          <span class="home-action-icon" aria-hidden="true" style="font-size: 3rem; margin: 0; box-shadow: 0 8px 24px rgba(0,0,0,0.05);">💎</span>
          <span style="font-size: 1.4rem; font-weight: 700; color: var(--color-text-title);">Diagenesis Engine</span>
          <span style="font-size: 1rem; color: var(--color-text-muted);">Interactive 3D simulation</span>
        </a>
      </section>
    </main>

    <script>
      const setTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      setTheme(localStorage.getItem("theme") || "dark");
      document.getElementById("theme-toggle").addEventListener("click", () => {
        setTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
      });

      // Model status popover logic
      const modelStatusBtn = document.getElementById("model-status-btn");
      const modelStatusPopover = document.getElementById("model-status-popover");
      const modelStatusPopoverText = document.getElementById("model-status-popover-text");

      modelStatusBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        modelStatusPopover.classList.toggle("is-visible");
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".model-info-dropdown-container")) {
          modelStatusPopover.classList.remove("is-visible");
        }
      });

      const refreshModelStatus = async () => {
        try {
          const response = await fetch("/model-status", { cache: "no-store" });
          const status = await response.json();
          modelStatusPopoverText.textContent = status.message;
          
          modelStatusPopoverText.className = "status-indicator-value";
          if (status.state === "ready") {
            modelStatusPopoverText.classList.add("status-ready");
          } else if (status.state === "loading" || status.state === "idle") {
            modelStatusPopoverText.classList.add("status-attempting");
            if (status.state === "loading") window.setTimeout(refreshModelStatus, 900);
          } else {
            modelStatusPopoverText.classList.add("status-error");
          }
        } catch {
          modelStatusPopoverText.textContent = "Unreachable (Network Error)";
          modelStatusPopoverText.className = "status-indicator-value status-error";
        }
      };
      refreshModelStatus();
    </script>
  </body>
</html>
