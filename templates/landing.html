<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fossils or Gum?</title>
    <link rel="stylesheet" href="$stylesheet_url">
  </head>
  <body>
    <div class="decor-blob decor-blob-1" aria-hidden="true"></div>
    <div class="decor-blob decor-blob-2" aria-hidden="true"></div>
    <main class="shell">
      <header class="app-header">
        <div class="logo-wrap">
          <span class="product-name">Fossils or Gum?</span>
        </div>
        <div class="header-actions">
          <div class="model-info-dropdown-container">
            <button id="model-status-btn" class="header-icon-btn" aria-label="Show Model Status" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
              </svg>
            </button>
            <div id="model-status-popover" class="model-info-popover">
              <div class="popover-header">
                <h3>System Status</h3>
              </div>
              <div class="popover-body">
                <div class="info-row">
                  <span class="info-label">Model status:</span>
                  <span id="model-status-popover-text" class="status-indicator-value">Checking...</span>
                </div>
              </div>
            </div>
          </div>
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light/dark theme" type="button">◐</button>
        </div>
      </header>

      <section class="panel home-panel" aria-label="Choose a section">
        <a class="home-action-card detector-card" href="/detector">
          <span class="home-action-icon" aria-hidden="true">🔍</span>
          <span class="home-action-title">Open detector/classifier</span>
        </a>
        <a class="home-action-card edu-card" href="/edu">
          <span class="home-action-icon" aria-hidden="true">👓</span>
          <span class="home-action-title">Go to edu-section</span>
        </a>
      </section>
    </main>

    <script>
      const setTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      setTheme(localStorage.getItem("theme") || "dark");
      document.getElementById("theme-toggle").addEventListener("click", () => {
        setTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
      });

      // Model status popover logic
      const modelStatusBtn = document.getElementById("model-status-btn");
      const modelStatusPopover = document.getElementById("model-status-popover");
      const modelStatusPopoverText = document.getElementById("model-status-popover-text");

      modelStatusBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        modelStatusPopover.classList.toggle("is-visible");
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".model-info-dropdown-container")) {
          modelStatusPopover.classList.remove("is-visible");
        }
      });

      const refreshModelStatus = async () => {
        try {
          const response = await fetch("/model-status", { cache: "no-store" });
          const status = await response.json();
          modelStatusPopoverText.textContent = status.message;
          
          modelStatusPopoverText.className = "status-indicator-value";
          if (status.state === "ready") {
            modelStatusPopoverText.classList.add("status-ready");
          } else if (status.state === "loading" || status.state === "idle") {
            modelStatusPopoverText.classList.add("status-attempting");
            if (status.state === "loading") window.setTimeout(refreshModelStatus, 900);
          } else {
            modelStatusPopoverText.classList.add("status-error");
          }
        } catch {
          modelStatusPopoverText.textContent = "Unreachable (Network Error)";
          modelStatusPopoverText.className = "status-indicator-value status-error";
        }
      };
      refreshModelStatus();
    </script>
  </body>
</html>
