<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Edu-page</title>
    <link rel="stylesheet" href="$stylesheet_url">
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div class="logo-wrap">
          <span class="header-tagline standalone-title">Edu-page</span>
        </div>
        <div class="header-actions">
          <a class="header-link-button" href="/">Home</a>
          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light/dark theme" type="button">◐</button>
        </div>
      </header>

      <section class="panel edu-panel">
        <h1>Welcome to the edupage</h1>
      </section>
    </main>

    <script>
      const setTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      setTheme(localStorage.getItem("theme") || "dark");
      document.getElementById("theme-toggle").addEventListener("click", () => {
        setTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
      });
    </script>
  </body>
</html>
