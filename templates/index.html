<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Fossil Tile Classifier</title>
    <link rel="stylesheet" href="$stylesheet_url">
    <style>
      .tool-form { display: none; margin-top: 16px; }
      .tool-form.is-active { display: flex; }
      .result-panel { min-height: 520px; }
      .detection-result-container,
      .tabs-container {
        width: 100%;
        overflow: visible;
      }
      .detection-header-summary {
        margin-bottom: 16px;
      }
      .annotated-preview-wrap {
        width: 100%;
        border-radius: 10px;
        overflow: hidden;
        background: rgba(0,0,0,0.18);
        display: flex;
        justify-content: center;
      }
      .annotated-preview-wrap img {
        max-width: 100%;
        max-height: 560px;
        object-fit: contain;
      }
      .specimens-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
        gap: 14px;
        margin-top: 16px;
      }
      .specimen-card {
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px;
        background: rgba(255,255,255,0.025);
        padding: 14px;
      }
      .specimen-card img {
        width: 100%;
        height: 130px;
        object-fit: contain;
        border-radius: 6px;
        background: rgba(0,0,0,0.18);
      }
      .specimen-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }
      .specimen-classification {
        margin-top: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .specimen-classification .eyebrow {
        margin-bottom: 0;
      }
      .compact-bars {
        margin-top: 4px;
      }
      .compact-bars .bar-row {
        padding: 8px 0;
      }
      .tiny-pill {
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        color: var(--color-text-muted);
      }
    </style>
  </head>
  <body>
    <div class="decor-blob decor-blob-1" aria-hidden="true"></div>
    <div class="decor-blob decor-blob-2" aria-hidden="true"></div>
    <main class="shell">
      <header class="app-header">
        <div class="logo-wrap">
          <span class="header-tagline standalone-title">Find and classify fossils</span>
        </div>
        <div class="header-actions">
          <a class="header-link-button" href="/">Home</a>
          
          <div class="model-info-dropdown-container">
            <button id="model-status-btn" class="header-icon-btn" aria-label="Show Model Status" type="button">
              <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
              </svg>
            </button>
            <div id="model-status-popover" class="model-info-popover">
              <div class="popover-header">
                <h3>System Status</h3>
              </div>
              <div class="popover-body">
                <div class="info-row">
                  <span class="info-label">Model status:</span>
                  <span id="model-status-popover-text" class="status-indicator-value">Checking...</span>
                </div>
              </div>
            </div>
          </div>

          <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle light/dark theme" type="button">◐</button>
        </div>
      </header>

      <section class="workspace">
        <div class="panel upload-window">
          <div class="upload-window-controls">
            <form id="analysis-form" method="post" enctype="multipart/form-data" class="upload-form tool-form is-active">
              <label class="drop-zone" for="image" id="drop-zone-label">
                <input id="image" name="image" type="file" accept="image/*" multiple required>
                <svg viewBox="0 0 24 24" width="44" height="44" stroke="currentColor" stroke-width="1.75" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; color: var(--color-primary);">
                  <path d="M18 10.286A6.5 6.5 0 0 0 5.828 7.5 6.5 6.5 0 0 0 6 20h11a5.5 5.5 0 0 0 1-10.714z"></path>
                  <polyline points="12 15 12 9"></polyline>
                  <polyline points="9 12 12 9 15 12"></polyline>
                </svg>
                <span class="drop-title">Upload tile photos for analysis</span>
                <span class="drop-copy">Drag images here or click to browse.</span>
                <span class="drop-formats">JPG, PNG, TIFF, HEIC</span>
                <span id="file-feedback" class="file-feedback" aria-live="polite"></span>
              </label>
              <button id="analyze-button" type="submit">
                <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;">
                  <circle cx="11" cy="11" r="8"></circle>
                  <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                Analyze fossils
              </button>
            </form>
          </div>
          $error_html
        </div>

        <div class="panel result-panel" id="result-panel" hidden>
        </div>
        <input id="upload-more-input" type="file" accept="image/*" multiple style="display: none;">
      </section>
    </main>

    <script>
      const escapeHTML = (str) => (str || "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;"
      }[char]));

      const resultPanel = document.getElementById("result-panel");
      const uploadWindow = document.querySelector(".upload-window");
      const modelStatus = document.getElementById("model-status");
      const themeToggle = document.getElementById("theme-toggle");
      const imageInput = document.getElementById("image");
      const analysisForm = document.getElementById("analysis-form");
      const analyzeButton = document.getElementById("analyze-button");
      const fileFeedback = document.getElementById("file-feedback");
      const DEFAULT_DETECTOR_CONFIDENCE = "0.25";
      const MAX_UPLOAD_BYTES = 75 * 1024 * 1024;
      let tabs = [];
      let activeTabId = null;

      const setTheme = (theme) => {
        document.documentElement.setAttribute("data-theme", theme);
        localStorage.setItem("theme", theme);
      };
      setTheme(localStorage.getItem("theme") || "dark");
      themeToggle.addEventListener("click", () => {
        setTheme(document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light");
      });

      const modelStatusBtn = document.getElementById("model-status-btn");
      const modelStatusPopover = document.getElementById("model-status-popover");
      const modelStatusPopoverText = document.getElementById("model-status-popover-text");

      modelStatusBtn.addEventListener("click", (event) => {
        event.stopPropagation();
        modelStatusPopover.classList.toggle("is-visible");
      });

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".model-info-dropdown-container")) {
          modelStatusPopover.classList.remove("is-visible");
        }
      });

      const refreshModelStatus = async () => {
        try {
          const response = await fetch("/model-status", { cache: "no-store" });
          const status = await response.json();
          if (modelStatus) modelStatus.textContent = status.message;
          modelStatusPopoverText.textContent = status.message;
          
          modelStatusPopoverText.className = "status-indicator-value";
          if (status.state === "ready") {
            modelStatusPopoverText.classList.add("status-ready");
          } else if (status.state === "loading" || status.state === "idle") {
            modelStatusPopoverText.classList.add("status-attempting");
            if (status.state === "loading") window.setTimeout(refreshModelStatus, 900);
          } else {
            modelStatusPopoverText.classList.add("status-error");
          }
        } catch {
          if (modelStatus) modelStatus.textContent = "Status unavailable";
          modelStatusPopoverText.textContent = "Unreachable (Network Error)";
          modelStatusPopoverText.className = "status-indicator-value status-error";
        }
      };
      refreshModelStatus();

      const updateFeedback = (input, feedback, button, baseText) => {
        const files = input.files;
        if (!files || files.length === 0) {
          feedback.textContent = "";
          feedback.classList.remove("is-visible");
          button.textContent = baseText;
          return;
        }
        const oversized = Array.from(files).filter((file) => file.size > MAX_UPLOAD_BYTES);
        if (oversized.length) {
          feedback.textContent = `${oversized.length} image${oversized.length === 1 ? "" : "s"} over 75 MB will be skipped`;
        } else {
          feedback.textContent = files.length === 1 ? `✓ ${files[0].name} added` : `✓ ${files.length} images added`;
        }
        feedback.classList.add("is-visible");
        button.textContent = files.length > 1 && !baseText.endsWith("s") ? `${baseText}s` : baseText;
      };

      imageInput.addEventListener("change", () => updateFeedback(imageInput, fileFeedback, analyzeButton, "Analyze fossils"));

      const addDrop = (dropZone, input, feedback, button, baseText) => {
        ["dragenter", "dragover"].forEach((eventName) => {
          dropZone.addEventListener(eventName, (event) => {
            event.preventDefault();
            dropZone.classList.add("is-dragover");
          });
        });
        ["dragleave", "drop"].forEach((eventName) => {
          dropZone.addEventListener(eventName, (event) => {
            event.preventDefault();
            dropZone.classList.remove("is-dragover");
          });
        });
        dropZone.addEventListener("drop", (event) => {
          if (event.dataTransfer.files.length) {
            input.files = event.dataTransfer.files;
            updateFeedback(input, feedback, button, baseText);
          }
        });
      };
      addDrop(document.getElementById("drop-zone-label"), imageInput, fileFeedback, analyzeButton, "Analyze fossils");

      const renderBars = (ranked) => ranked.map((item) => {
        const confidence = item.confidence * 100;
        return `
          <div class="bar-row bar-row-${escapeHTML(item.class_name)}">
            <div class="bar-label">
              <span>${escapeHTML(item.display)}</span>
              <span>${confidence.toFixed(1)}%</span>
            </div>
            <div class="bar-track"><div class="bar-fill" style="width: ${confidence}%"></div></div>
          </div>
        `;
      }).join("");

      const renderInteractivePreview = (data, selectedFossilId = 1) => {
        const width = data.image_width || 1;
        const height = data.image_height || 1;
        const overlays = data.fossils.map((fossil, index) => {
          const [xmin, ymin, xmax, ymax] = fossil.bbox;
          const left = (xmin / width) * 100;
          const top = (ymin / height) * 100;
          const boxWidth = ((xmax - xmin) / width) * 100;
          const boxHeight = ((ymax - ymin) / height) * 100;
          const rawClassName = fossil.classification?.ranked?.[0]?.class_name || "";
          const className = fossil.classification?.ranked?.[0]?.display || "Unknown";
          const fossilClass = rawClassName.toLowerCase().includes("coral") ? "is-coral" : rawClassName.toLowerCase().includes("shell") ? "is-shell" : "";
          const tagName = fossilClass === "is-shell" ? "Shell" : fossilClass === "is-coral" ? "Coral" : className;
          const classConfidence = fossil.classification?.confidence_percent || 0;
          return `
            <button
              class="interactive-box ${fossilClass} ${fossil.id === selectedFossilId ? "is-active" : ""}"
              type="button"
              data-fossil-id="${fossil.id}"
              aria-label="Show Fossil ${fossil.id} details"
              style="left:${left}%; top:${top}%; width:${boxWidth}%; height:${boxHeight}%;"
            >
              <span class="interactive-box-label">F${fossil.id} ${escapeHTML(tagName)} ${classConfidence.toFixed(0)}%</span>
            </button>
          `;
        }).join("");
        return `
          <div class="interactive-preview-wrap">
            <div class="interactive-image-stage" style="aspect-ratio: ${width} / ${height}; width: auto; height: auto; max-width: 100%; max-height: 100%; display: inline-flex;">
              <img src="${data.image_url || data.annotated_image_url}" alt="Image with interactive fossil boxes" style="width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 4px;">
              <div class="interactive-box-layer">${overlays}</div>
            </div>
          </div>
        `;
      };

      const predictionExplanation = (fossil) => {
        const top = fossil.classification?.ranked?.[0];
        const className = (top?.class_name || top?.display || "").toLowerCase();
        if (className.includes("coral")) {
          return "The crop is being read as coral-like because the strongest visual signal resembles clustered, branching, or honeycomb-style texture rather than a single shell outline. This is a model cue, not a palaeontological proof.";
        }
        if (className.includes("shell")) {
          return "The crop is being read as shell-like because the strongest visual signal resembles a compact curved form, ribbing, or a brachiopod-style outline. This is a model cue, not a palaeontological proof.";
        }
        return "The model found a fossil-shaped crop, but the class evidence is weak or unavailable for this detection.";
      };

      const renderFossilCard = (fossil, variant = "selected") => {
        const label = fossil.classification?.label || "Classification unavailable";
        const confidence = fossil.classification?.confidence_percent || 0;
        const explanation = predictionExplanation(fossil);
        return `
          <article class="specimen-card ${variant === "selected" ? "is-selected-card" : ""}" data-fossil-card-id="${fossil.id}">
            <div class="specimen-top">
              <strong>Fossil ${fossil.id}</strong>
              <span class="tiny-pill">${(fossil.score * 100).toFixed(0)}% box confidence</span>
            </div>
            <img src="${fossil.cropped_image_url}" alt="Fossil ${fossil.id} crop">
            <div class="specimen-classification">
              <div class="classification-title-row">
                <p class="eyebrow">Classification</p>
                <button class="why-button" type="button" data-explain-fossil-id="${fossil.id}" aria-expanded="false" title="Show prediction explanation">?</button>
                <p class="prediction-explanation" data-explanation-for="${fossil.id}" hidden>${escapeHTML(explanation)}</p>
              </div>
              <h3>${escapeHTML(label)}</h3>
              <p class="description">
                ${confidence.toFixed(1)}% classifier confidence
              </p>
              ${fossil.classification?.ranked?.length ? `<div class="bars compact-bars">${renderBars(fossil.classification.ranked)}</div>` : ""}
            </div>
          </article>
        `;
      };

      const renderDetectionResult = (data, selectedFossilId = 1, showAll = false) => {
        const selected = data.fossils.find((fossil) => fossil.id === selectedFossilId) || data.fossils[0];
        const fossilCards = data.fossils.map((fossil) => renderFossilCard(fossil, "grid")).join("");
        return `
          <div class="detection-result-container">
            <div class="detection-header-summary">
              <h2>Found and classified ${data.fossils.length} fossil boxes</h2>
              <p class="description">Click a box to inspect that fossil.</p>
            </div>
            <div class="detection-main-layout ${showAll ? "is-expanded-all" : ""}">
              <div class="detection-image-column">
                ${renderInteractivePreview(data, selected.id)}
              </div>
              ${showAll ? "" : `<aside class="selected-fossil-panel" aria-live="polite">
                ${renderFossilCard(selected, "selected")}
                <div class="selected-card-actions"><button class="display-all-button" type="button" data-toggle-all-fossils aria-expanded="false">Display all</button></div>
              </aside>`}
            </div>
            <section class="all-fossils-section ${showAll ? "is-expanded" : "is-collapsed"}" ${showAll ? "" : "hidden"}>
              <div class="all-fossils-toolbar">
                <button class="display-all-button hide-all-button" type="button" data-toggle-all-fossils aria-expanded="true">Hide</button>
              </div>
              <div class="specimens-grid all-specimens-grid">${fossilCards}</div>
            </section>
          </div>
        `;
      };

      const makeTabId = () => `tab-${Date.now()}-${Math.random().toString(16).slice(2)}`;
      const shortName = (name) => name.length > 28 ? `${name.slice(0, 14)}...${name.slice(-10)}` : name;
      const tabThresholdText = (tab) => `${Math.round(Number(tab.confidence || DEFAULT_DETECTOR_CONFIDENCE) * 100)}%`;

      const renderDetectRefreshControl = (tab) => {
        if (tab.kind !== "detect") return "";
        const value = tab.confidence || DEFAULT_DETECTOR_CONFIDENCE;
        return `
          <div class="tab-rerun-control">
            <div class="rerun-copy">
              <span class="rerun-label">Detector confidence</span>
              <strong id="active-tab-confidence-value">${Math.round(Number(value) * 100)}%</strong>
            </div>
            <input id="active-tab-confidence-slider" data-tab-confidence-id="${tab.id}" type="range" min="0.05" max="0.50" step="0.05" value="${value}">
            <button class="rerun-button" type="button" data-rerun-tab-id="${tab.id}" title="Refresh boxes with this confidence">↻ Refresh boxes</button>
          </div>
        `;
      };

      const renderActiveTabContent = () => {
        const active = tabs.find((tab) => tab.id === activeTabId);
        if (!active) {
          return `
            <div class="empty-state">
              <div class="sample-tile"></div>
              <h2>Upload an image to analyze it.</h2>
              <p>The app will draw fossil boxes, then classify every crop as coral or brachiopod.</p>
            </div>
          `;
        }
        if (active.status === "loading") {
          return `
            <div class="tab-loading-state">
              <div class="loader-spinner"></div>
              <p>${escapeHTML(active.message || "Working on image...")}</p>
              ${active.meta ? `<p class="tiny-pill">${escapeHTML(active.meta)}</p>` : ""}
            </div>
          `;
        }
        if (active.status === "error") {
          return `
            ${renderDetectRefreshControl(active)}
            <div class="tab-error-state">
              <div class="error">${escapeHTML(active.error || "Something went wrong.")}</div>
              ${active.meta ? `<p class="description">${escapeHTML(active.meta)}</p>` : ""}
            </div>
          `;
        }
        return `${renderDetectRefreshControl(active)}${active.html}`;
      };

      const renderTabs = () => {
        const previousTabBar = resultPanel.querySelector(".tab-bar");
        const previousTabScrollLeft = previousTabBar ? previousTabBar.scrollLeft : 0;
        if (!tabs.length) {
          resultPanel.innerHTML = "";
          resultPanel.hidden = true;
          uploadWindow.hidden = false;
          return;
        }
        resultPanel.hidden = false;
        const tabButtons = tabs.map((tab) => `
          <div class="tab-item ${tab.id === activeTabId ? "active" : ""} ${tab.status === "loading" ? "is-loading" : ""} ${tab.status === "error" ? "is-error" : ""}" role="tab" tabindex="0" data-tab-id="${tab.id}">
            <span class="tab-indicator-dot"></span>
            <span class="tab-name" title="${escapeHTML(tab.name)}">${escapeHTML(shortName(tab.name))}</span>
            <button class="tab-close-btn" type="button" aria-label="Close ${escapeHTML(tab.name)}" data-close-tab-id="${tab.id}">×</button>
          </div>
        `).join("");
        resultPanel.innerHTML = `
          <div class="tabs-container">
            <div class="tab-row-wrapper">
              <button class="tab-upload-more-btn" id="upload-more-btn" type="button" title="Upload more images">
                <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle; margin-right: 4px;">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                <span>Add more photos</span>
              </button>
              <div class="tab-bar" aria-label="Uploaded image tabs">
                ${tabButtons}
              </div>
            </div>
            <div class="tab-content">${renderActiveTabContent()}</div>
          </div>
        `;
        const uploadMoreBtn = resultPanel.querySelector("#upload-more-btn");
        if (uploadMoreBtn) {
          uploadMoreBtn.addEventListener("click", () => {
            document.getElementById("upload-more-input").click();
          });
        }
        const currentTabBar = resultPanel.querySelector(".tab-bar");
        if (currentTabBar) {
          currentTabBar.scrollLeft = previousTabScrollLeft;
          requestAnimationFrame(() => {
            currentTabBar.scrollLeft = previousTabScrollLeft;
          });
        }
        resultPanel.querySelectorAll("[data-tab-id]").forEach((button) => {
          button.addEventListener("click", () => {
            activeTabId = button.dataset.tabId;
            renderTabs();
          });
          button.addEventListener("keydown", (event) => {
            if (event.key === "Enter" || event.key === " ") {
              event.preventDefault();
              activeTabId = button.dataset.tabId;
              renderTabs();
            }
          });
        });
        resultPanel.querySelectorAll("[data-close-tab-id]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const id = button.dataset.closeTabId;
            const index = tabs.findIndex((tab) => tab.id === id);
            tabs = tabs.filter((tab) => tab.id !== id);
            if (activeTabId === id) {
              activeTabId = tabs[Math.max(0, index - 1)]?.id || tabs[0]?.id || null;
            }
            renderTabs();
          });
        });
        const activeConfidenceSlider = resultPanel.querySelector("[data-tab-confidence-id]");
        if (activeConfidenceSlider) {
          activeConfidenceSlider.addEventListener("input", () => {
            const id = activeConfidenceSlider.dataset.tabConfidenceId;
            const value = activeConfidenceSlider.value;
            tabs = tabs.map((tab) => tab.id === id ? { ...tab, confidence: value } : tab);
            const output = document.getElementById("active-tab-confidence-value");
            if (output) output.textContent = `${Math.round(Number(value) * 100)}%`;
          });
        }
        resultPanel.querySelectorAll("[data-rerun-tab-id]").forEach((button) => {
          button.addEventListener("click", async () => {
            const id = button.dataset.rerunTabId;
            const tab = tabs.find((item) => item.id === id);
            if (!tab || !tab.file) return;
            const confidence = tab.confidence || DEFAULT_DETECTOR_CONFIDENCE;
            setTabResult(id, {
              status: "loading",
              message: "Refreshing fossil boxes...",
              meta: `Threshold ${Math.round(Number(confidence) * 100)}%`,
            });
            await detectOne(tab.file, id, confidence);
          });
        });
        resultPanel.querySelectorAll(".interactive-box").forEach((box) => {
          box.addEventListener("click", (event) => {
            event.stopPropagation();
            const active = tabs.find((tab) => tab.id === activeTabId);
            if (!active?.resultData) return;
            const fossilId = Number(box.dataset.fossilId);
            tabs = tabs.map((tab) => {
              if (tab.id !== activeTabId) return tab;
              return {
                ...tab,
                selectedFossilId: fossilId,
                html: renderDetectionResult(tab.resultData, fossilId, tab.showAllFossils),
              };
            });
            renderTabs();
          });
        });
        resultPanel.querySelectorAll("[data-toggle-all-fossils]").forEach((button) => {
          button.addEventListener("click", () => {
            let willShowAll = false;
            tabs = tabs.map((tab) => {
              if (tab.id !== activeTabId || !tab.resultData) return tab;
              const showAll = !tab.showAllFossils;
              willShowAll = showAll;
              return {
                ...tab,
                showAllFossils: showAll,
                html: renderDetectionResult(tab.resultData, tab.selectedFossilId || 1, showAll),
              };
            });
            renderTabs();
            if (willShowAll) {
              requestAnimationFrame(() => {
                resultPanel.querySelector(".all-fossils-section")?.scrollIntoView({
                  behavior: "smooth",
                  block: "start",
                });
              });
            }
          });
        });
        resultPanel.querySelectorAll("[data-explain-fossil-id]").forEach((button) => {
          button.addEventListener("click", (event) => {
            event.stopPropagation();
            const card = button.closest(".specimen-card");
            if (!card) return;
            const explanation = card.querySelector(`[data-explanation-for="${button.dataset.explainFossilId}"]`);
            if (!explanation) return;
            const isHidden = explanation.hasAttribute("hidden");
            resultPanel.querySelectorAll(".prediction-explanation:not([hidden])").forEach((panel) => {
              if (panel !== explanation) {
                panel.hidden = true;
                panel.closest(".specimen-card")?.querySelector("[data-explain-fossil-id]")?.setAttribute("aria-expanded", "false");
              }
            });
            explanation.toggleAttribute("hidden", !isHidden);
            button.setAttribute("aria-expanded", String(isHidden));
          });
        });
      };

      document.addEventListener("click", (event) => {
        if (event.target.closest(".prediction-explanation") || event.target.closest("[data-explain-fossil-id]")) return;
        resultPanel.querySelectorAll(".prediction-explanation:not([hidden])").forEach((panel) => {
          panel.hidden = true;
          panel.closest(".specimen-card")?.querySelector("[data-explain-fossil-id]")?.setAttribute("aria-expanded", "false");
        });
      });

      const addLoadingTabs = (files, kind, message, meta) => {
        const newTabs = Array.from(files).map((file) => ({
          id: makeTabId(),
          name: file.name,
          file,
          kind,
          confidence: kind === "detect" ? DEFAULT_DETECTOR_CONFIDENCE : "",
          status: "loading",
          message,
          meta,
        }));
        tabs = [...tabs, ...newTabs];
        uploadWindow.hidden = true;
        activeTabId = newTabs[0]?.id || activeTabId;
        renderTabs();
        return newTabs;
      };

      const setTabResult = (id, patch) => {
        tabs = tabs.map((tab) => tab.id === id ? { ...tab, ...patch } : tab);
        renderTabs();
      };

      const detectOne = async (file, tabId, confidence) => {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 120000);
        const formData = new FormData();
        formData.append("image", file);
        formData.append("confidence", confidence);
        try {
          const response = await fetch("/detect", { method: "POST", body: formData, signal: controller.signal });
          const contentType = response.headers.get("content-type") || "";
          if (!contentType.includes("application/json")) {
            throw new Error(`Server returned ${response.status} instead of a detection result.`);
          }
          const data = await response.json();
          if (!data.success) throw new Error(data.error || "Detection failed.");
          if (data.no_detections || !data.fossils.length) {
            setTabResult(tabId, {
              status: "ready",
              confidence,
              html: `
                <div class="detection-result-container">
                  <div class="detection-header-summary">
                    <p class="eyebrow">YOLO box detector</p>
                    <h2>No fossil boxes found</h2>
                    <p class="description">Detector confidence threshold: ${(Number(confidence) * 100).toFixed(0)}%. Try refreshing this tab with a lower detector confidence level.</p>
                  </div>
                  <div class="failed-detection-wrap">
                    <div class="failure-badge" aria-label="No fossils detected">×</div>
                    <img src="${data.annotated_image_url}" alt="Uploaded image with no fossil boxes detected">
                  </div>
                </div>
              `,
            });
            return;
          }
          setTabResult(tabId, {
            status: "ready",
            confidence,
            resultData: data,
            selectedFossilId: data.fossils[0].id,
            showAllFossils: false,
            html: renderDetectionResult(data, data.fossils[0].id, false),
          });
        } catch (error) {
          setTabResult(tabId, {
            status: "error",
            confidence,
            error: error.name === "AbortError" ? "Detector timed out after 120 seconds." : error.message,
            meta: `Tried threshold ${(Number(confidence) * 100).toFixed(0)}%`,
          });
        } finally {
          clearTimeout(timeoutId);
        }
      };

      analysisForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        const selectedFiles = Array.from(imageInput.files || []);
        if (!selectedFiles.length) return;
        analyzeButton.disabled = true;
        analyzeButton.textContent = "Analyzing fossils...";
        const confidence = DEFAULT_DETECTOR_CONFIDENCE;
        const jobs = addLoadingTabs(
          selectedFiles,
          "detect",
          "Drawing fossil boxes and classifying crops...",
          `Threshold ${Math.round(Number(confidence) * 100)}%`
        );
        for (let index = 0; index < jobs.length; index += 1) {
          const file = selectedFiles[index];
          if (file.size > MAX_UPLOAD_BYTES) {
            setTabResult(jobs[index].id, {
              status: "error",
              confidence,
              error: "This image is larger than the 75 MB upload limit.",
              meta: `${file.name} is ${(file.size / (1024 * 1024)).toFixed(1)} MB`,
            });
            continue;
          }
          await detectOne(file, jobs[index].id, confidence);
        }
        try {
          imageInput.value = "";
          updateFeedback(imageInput, fileFeedback, analyzeButton, "Analyze fossils");
        } finally {
          analyzeButton.disabled = false;
          analyzeButton.textContent = "Analyze fossils";
        }
      });

      const uploadMoreInput = document.getElementById("upload-more-input");
      uploadMoreInput.addEventListener("change", async () => {
        const selectedFiles = Array.from(uploadMoreInput.files || []);
        if (!selectedFiles.length) return;
        const confidence = DEFAULT_DETECTOR_CONFIDENCE;
        const jobs = addLoadingTabs(
          selectedFiles,
          "detect",
          "Drawing fossil boxes and classifying crops...",
          `Threshold ${Math.round(Number(confidence) * 100)}%`
        );
        uploadMoreInput.value = "";
        for (let index = 0; index < jobs.length; index += 1) {
          const file = selectedFiles[index];
          if (file.size > MAX_UPLOAD_BYTES) {
            setTabResult(jobs[index].id, {
              status: "error",
              confidence,
              error: "This image is larger than the 75 MB upload limit.",
              meta: `${file.name} is ${(file.size / (1024 * 1024)).toFixed(1)} MB`,
            });
            continue;
          }
          await detectOne(file, jobs[index].id, confidence);
        }
      });
    </script>
  </body>
</html>
